[pytest]
pythonpath = .
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests
    ws: websocket tests
    concurrent: concurrency tests
    smoke: smoke tests for import chain integrity
addopts =
    --strict-markers
    --timeout=30
    --tb=short
    -q
asyncio_mode = auto
