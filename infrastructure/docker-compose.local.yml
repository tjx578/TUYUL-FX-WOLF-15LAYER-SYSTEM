version: "3.9"

services:
  wolf15-api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wolf15
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  wolf15-engine:
    build:
      context: ..
      dockerfile: services/engine/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wolf15
      RUN_MODE: engine-only
    depends_on:
      - redis
      - postgres

  wolf15-ingest:
    build:
      context: ..
      dockerfile: services/ingest/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    depends_on:
      - redis

  wolf15-orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wolf15
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wolf15
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
