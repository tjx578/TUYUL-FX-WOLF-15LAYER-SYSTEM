# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Wolf 15-Layer System — Authoritative CI/CD Pipeline
#
# This is the SINGLE authoritative pipeline. All other CI workflows
# (ci.yml, wolf-ci.yml, wolf-15-ci.yml) are deprecated and disabled.
#
# Job order (critical path):
#   Phase 0 (parallel): ruff-lint, ascii-compliance
#   Phase 1: mypy type check
#   Phase 2: constitutional boundary check  (HARD BLOCK on violations)
#   Phase 3: schema validation
#   Phase 4: critical test gate             (HARD BLOCK on failure)
#   Phase 5: coverage gate (≥70%)
#   Phase 6: integration / import-chain
#   Phase 7: dashboard build + ESLint       (parallel with Phase 5–6)
#   Final:    governance-verdict            (merge gatekeeper)

name: "Wolf 15-Layer CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: wolf-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
# ──────────────────────────────────────────────────────────────────────────
# PHASE 0-A · Ruff lint + format (hard-fail)
# ──────────────────────────────────────────────────────────────────────────
  ruff:
    name: "Phase 0-A · Ruff lint & format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: "Ruff check (lint)"
        run: ruff check . --config pyproject.toml

      - name: "Ruff format check"
        run: ruff format --check . --config pyproject.toml

# ──────────────────────────────────────────────────────────────────────────
# PHASE 0-B · ASCII compliance (hard-fail)
# ──────────────────────────────────────────────────────────────────────────
  ascii-compliance:
    name: "Phase 0-B · ASCII compliance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Check all .py files are ASCII-safe"
        run: |
          python - <<'EOF'
          import pathlib, sys
          SAFE_NON_ASCII = set('""''\u2019\u2018\u2013\u2014')
          errors = []
          for p in pathlib.Path('.').rglob('*.py'):
              parts = p.parts
              if any(x in parts for x in ('.venv', '__pycache__', 'node_modules')):
                  continue
              try:
                  text = p.read_text(encoding='utf-8')
              except Exception as e:
                  errors.append(f'{p}: read error {e}')
                  continue
              for i, line in enumerate(text.splitlines(), 1):
                  for ch in line:
                      if ord(ch) > 127 and ch not in SAFE_NON_ASCII:
                          errors.append(f'{p}:{i} -> U+{ord(ch):04X} ({ch!r})')
          if errors:
              print('ASCII violations found:')
              for e in errors[:50]:
                  print(f'  {e}')
              sys.exit(1)
          print('All .py files pass ASCII compliance.')
          EOF

# ──────────────────────────────────────────────────────────────────────────
# PHASE 1 · mypy type check (hard-fail)
# ──────────────────────────────────────────────────────────────────────────
  mypy:
    name: "Phase 1 · mypy (strict)"
    runs-on: ubuntu-latest
    needs: [ruff, ascii-compliance]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests types-redis

      - name: "mypy (hard-fail)"
        run: |
          set -o pipefail
          mypy . --config-file pyproject.toml 2>&1 | tee mypy-report.txt

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────
# PHASE 2 · Constitutional boundary check (HARD BLOCK)
# ──────────────────────────────────────────────────────────────────────────
  constitutional-boundary:
    name: "Phase 2 · Constitutional Boundary"
    runs-on: ubuntu-latest
    needs: [ruff, ascii-compliance]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Rule 1 - analysis must NOT contain execution logic"
        run: |
          echo "Checking analysis/ for forbidden execution patterns..."
          VIOLATIONS=$(grep -rn \
            -e "place_order" \
            -e "execute_trade" \
            -e "send_order" \
            -e "market_execution" \
            -e "mt4_send" \
            -e "mt5_send" \
            --include="*.py" analysis/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CONSTITUTIONAL VIOLATION: analysis/ contains execution logic!"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ analysis/ clean — no execution side-effects"

      - name: "Rule 2 - execution must NOT contain strategy logic"
        run: |
          echo "Checking execution/ for forbidden strategy patterns..."
          VIOLATIONS=$(grep -rn \
            -e "calculate_signal" \
            -e "market_direction" \
            -e "trend_analysis" \
            -e "wolf_score" \
            -e "confluence" \
            -e "generate_verdict" \
            --include="*.py" execution/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CONSTITUTIONAL VIOLATION: execution/ contains strategy logic!"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ execution/ clean — blind executor only"

      - name: "Rule 3 - dashboard must NOT override L12"
        run: |
          echo "Checking dashboard/ for L12 override patterns..."
          VIOLATIONS=$(grep -rn \
            -e "override_verdict" \
            -e "force_execute" \
            -e "bypass_gate" \
            -e "skip_constitution" \
            -e "ignore_l12" \
            --include="*.py" dashboard/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CONSTITUTIONAL VIOLATION: dashboard/ attempts L12 override!"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ dashboard/ clean — read-only governor"

      - name: "Rule 4 - journal must be append-only"
        run: |
          echo "Checking journal/ for mutation patterns..."
          VIOLATIONS=$(grep -rn \
            -e "\.delete(" \
            -e "\.update(" \
            -e "\.remove(" \
            -e "DELETE FROM" \
            -e "UPDATE.*SET" \
            -e "truncate" \
            --include="*.py" journal/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CONSTITUTIONAL VIOLATION: journal/ contains mutation logic!"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ journal/ clean — immutable audit trail"

      - name: "Rule 5 - ea_interface must NOT contain decision logic"
        run: |
          echo "Checking ea_interface/ for decision patterns..."
          VIOLATIONS=$(grep -rn \
            -e "generate_verdict" \
            -e "wolf_score" \
            -e "should_trade" \
            -e "analyze_market" \
            --include="*.py" ea_interface/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CONSTITUTIONAL VIOLATION: ea_interface/ contains decision logic!"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ ea_interface/ clean — executor only"

      - name: "Rule 6 - No hardcoded secrets"
        run: |
          echo "Checking for hardcoded secrets..."
          VIOLATIONS=$(grep -rn \
            -e "FINNHUB_API_KEY\s*=" \
            -e "TELEGRAM_BOT_TOKEN\s*=" \
            -e "REDIS_PASSWORD\s*=" \
            -e "JWT_SECRET\s*=" \
            --include="*.py" \
            --exclude-dir=.venv \
            --exclude="*.example" \
            . || true)
          # Filter out os.getenv / os.environ patterns (these are safe)
          REAL_VIOLATIONS=$(echo "$VIOLATIONS" | grep -v "os\.getenv\|os\.environ\|\.env\|config\.\|#" || true)
          if [ -n "$REAL_VIOLATIONS" ]; then
            echo "❌ SECURITY VIOLATION: Hardcoded secrets detected!"
            echo "$REAL_VIOLATIONS"
            exit 1
          fi
          echo "No hardcoded secrets found"

# ──────────────────────────────────────────────────────────────────────────
# PHASE 3 · Schema validation
# ──────────────────────────────────────────────────────────────────────────
  schema-validation:
    name: "Phase 3 · Schema Validation"
    runs-on: ubuntu-latest
    needs: [ruff, ascii-compliance]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: "Validate L12 JSON schema"
        run: |
          python -c "
          import json, jsonschema
          with open('schemas/l12_schema.json') as f:
              schema = json.load(f)
          jsonschema.Draft7Validator.check_schema(schema)
          print('l12_schema.json is a valid JSON Schema')
          "

      - name: "Validate alert JSON schema"
        run: |
          python -c "
          import json, jsonschema
          with open('schemas/alert_schema.json') as f:
              schema = json.load(f)
          jsonschema.Draft7Validator.check_schema(schema)
          print('alert_schema.json is a valid JSON Schema')
          "

      - name: "Validate config YAML files"
        run: |
          python -c "
          import yaml, glob, sys
          errors = []
          for f in (
              glob.glob('config/**/*.yaml', recursive=True)
              + glob.glob('config/**/*.yml', recursive=True)
          ):
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'OK: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'FAIL: {f}: {e}')
          if errors:
              sys.exit(1)
          print('All YAML configs valid')
          "

# ──────────────────────────────────────────────────────────────────────────
# PHASE 4 · Critical test gate (HARD BLOCK on failure)
# ──────────────────────────────────────────────────────────────────────────
  critical-tests:
    name: "Phase 4 · Critical Test Gate"
    runs-on: ubuntu-latest
    needs: [mypy, constitutional-boundary, schema-validation]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-asyncio

      - name: "Critical gate tests (must pass to merge)"
        env:
          PYTHONPATH: .
        run: |
          pytest \
            tests/test_l12_gate.py \
            tests/test_l12_verdict.py \
            tests/test_l11_rr.py \
            tests/test_l2_mta.py \
            tests/test_l10_dynamic_sizing.py \
            tests/test_l10_kelly_integration.py \
            tests/test_l6_correlation_integration.py \
            tests/contract/test_public_api_contract.py \
            tests/test_prop_firm.py \
            tests/test_news_lock.py \
            tests/test_m15_cancel.py \
            tests/test_signal_integrity.py \
            tests/test_signal_throttle.py \
            tests/test_pip_values.py \
            tests/test_journal.py \
            tests/test_l9_smc.py \
            tests/test_dynamic_position_sizing.py \
            tests/test_spread_estimator.py \
            tests/test_integration.py \
            tests/test_pipeline_e2e.py \
            tests/engines/test_engine_suite.py \
            tests/engines/test_quantum_advisory_engine.py \
            tests/test_cognitive_risk_simulation.py \
            tests/test_fusion_precision_engine.py \
            -v \
            --strict-markers \
            --timeout=60 \
            --tb=short \
            --junitxml=test-results/critical.xml

      - name: Upload critical test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-critical
          path: test-results/critical.xml
          retention-days: 14


# ──────────────────────────────────────────────────────────────────────────
# PHASE 5 · Full test suite + coverage gate (>=70%)
# ──────────────────────────────────────────────────────────────────────────
  coverage-gate:
    name: "Phase 5 · Coverage Gate (>=70%)"
    runs-on: ubuntu-latest
    needs: critical-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-asyncio coverage

      - name: "Full test suite with coverage"
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --cov=analysis \
            --cov=constitution \
            --cov=execution \
            --cov=dashboard \
            --cov=journal \
            --cov=risk \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --strict-markers \
            --timeout=60 \
            --tb=short \
            --junitxml=test-results/full.xml \
            -q

      - name: "Enforce coverage threshold"
        run: coverage report --fail-under=70

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          flags: unittests

      - name: Upload full test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-full
          path: |
            test-results/full.xml
            coverage.xml
          retention-days: 30

# ──────────────────────────────────────────────────────────────────────────
# PHASE 6 · Import chain & pipeline dry-run
# ──────────────────────────────────────────────────────────────────────────
  integration:
    name: "Phase 6 · Integration"
    runs-on: ubuntu-latest
    needs: critical-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Import chain validation"
        env:
          PYTHONPATH: .
        run: |
          python - <<'EOF'
          import sys

          checks = [
              ("core.core_cognitive_unified",    "core_cognitive_unified"),
              ("core.core_quantum_unified",       "core_quantum_unified"),
              ("core.core_reflective_unified",    "core_reflective_unified"),
              ("constitution.verdict_engine",     "verdict_engine"),
              ("risk.prop_firm",                  "prop_firm"),
          ]
          failed = []
          for mod, label in checks:
              try:
                  __import__(mod)
                  print(f"  OK: {label}")
              except Exception as e:
                  print(f"  FAIL: {label}: {e}")
                  failed.append(label)

          if failed:
              print(f"\nFailed imports: {failed}")
              sys.exit(1)
          print("\nAll import chains valid.")
          EOF

      - name: "Pipeline dry-run"
        env:
          PYTHONPATH: .
        run: |
          python - <<'EOF'
          try:
              from pipeline import WolfConstitutionalPipeline
              p = WolfConstitutionalPipeline()
              print(f"Pipeline instantiated: {type(p).__name__}")
          except Exception as e:
              # Redis / Finnhub not available in CI -- acceptable
              print(f"Pipeline instantiation note: {e}")
              print("(Expected if external services unavailable in CI)")
          EOF

      - name: "Pytest integration tests"
        env:
          PYTHONPATH: .
        continue-on-error: true
        run: |
          pytest tests/integration/ \
            -v --strict-markers --timeout=60 --tb=short \
            --junitxml=test-results/integration.xml \
            -m "integration" || true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: test-results/integration.xml
          retention-days: 14

# ──────────────────────────────────────────────────────────────────────────
# PHASE 7 · Dashboard build + ESLint (hard-fail)
# Runs in parallel with Phases 5-6 (only needs Phase 0)
# ──────────────────────────────────────────────────────────────────────────
  dashboard:
    name: "Phase 7 · Dashboard (ESLint + tsc + build)"
    runs-on: ubuntu-latest
    needs: [ruff, ascii-compliance]
    defaults:
      run:
        working-directory: dashboard/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: "ESLint (hard-fail, zero warnings)"
        run: npm run lint -- --max-warnings=0

      - name: "TypeScript type-check"
        run: npx tsc --noEmit

      - name: "Next.js build"
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

# ──────────────────────────────────────────────────────────────────────────
# FINAL GATE · Governance verdict (merge gatekeeper)
# ──────────────────────────────────────────────────────────────────────────
  governance-verdict:
    name: "Governance Verdict"
    runs-on: ubuntu-latest
    needs:
      - ruff
      - ascii-compliance
      - mypy
      - constitutional-boundary
      - schema-validation
      - critical-tests
      - coverage-gate
      - integration
      - dashboard
    if: always()
    steps:
      - name: "Report phase results"
        run: |
          echo "=========================================="
          echo " Wolf 15-Layer CI -- Pipeline Results"
          echo "=========================================="
          echo " Phase 0-A  ruff:                   ${{ needs.ruff.result }}"
          echo " Phase 0-B  ascii-compliance:        ${{ needs.ascii-compliance.result }}"
          echo " Phase 1    mypy:                    ${{ needs.mypy.result }}"
          echo " Phase 2    constitutional-boundary: ${{ needs.constitutional-boundary.result }}"
          echo " Phase 3    schema-validation:       ${{ needs.schema-validation.result }}"
          echo " Phase 4    critical-tests:          ${{ needs.critical-tests.result }}"
          echo " Phase 5    coverage-gate:           ${{ needs.coverage-gate.result }}"
          echo " Phase 6    integration:             ${{ needs.integration.result }}"
          echo " Phase 7    dashboard:               ${{ needs.dashboard.result }}"
          echo "=========================================="

      - name: "Hard block -- constitutional violations"
        if: needs.constitutional-boundary.result != 'success'
        run: |
          echo "CONSTITUTIONAL VIOLATION DETECTED"
          echo "Merge is BLOCKED -- authority boundaries must be preserved."
          exit 1

      - name: "Hard block -- critical test failures"
        if: needs.critical-tests.result != 'success'
        run: |
          echo "CRITICAL TEST FAILURE"
          echo "Merge is BLOCKED -- fix failing tests before merging."
          exit 1

      - name: "Hard block -- coverage below 70%"
        if: needs.coverage-gate.result != 'success'
        run: |
          echo "COVERAGE GATE FAILURE"
          echo "Merge is BLOCKED -- test coverage must be >= 70%."
          exit 1

      - name: "Verdict: GRANTED"
        if: >-
          needs.constitutional-boundary.result == 'success' &&
          needs.critical-tests.result == 'success' &&
          needs.coverage-gate.result == 'success'
        run: |
          echo "VERDICT: GRANTED -- All constitutional gates passed."
          echo "Pipeline is safe for merge."
