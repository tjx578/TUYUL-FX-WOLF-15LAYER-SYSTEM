name: Wolf-15 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check . --select E,F,W

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        group: [unit-analysis, unit-constitution, unit-execution, unit-dashboard, unit-risk, unit-journal, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio pytest-cov pytest-xdist httpx websockets aiohttp
      - name: Run tests — ${{ matrix.group }}
        run: |
          case "${{ matrix.group }}" in
            unit-analysis)
              pytest tests/unit/test_analysis*.py tests/unit/test_feed*.py -x -v --timeout=30 ;;
            unit-constitution)
              pytest tests/unit/test_constitution*.py tests/unit/test_verdict*.py tests/unit/test_layer12*.py -x -v --timeout=30 ;;
            unit-execution)
              pytest tests/unit/test_execution*.py tests/unit/test_pending*.py tests/unit/test_state_machine*.py -x -v --timeout=30 ;;
            unit-dashboard)
              pytest tests/unit/test_dashboard*.py tests/unit/test_ws*.py tests/unit/test_api*.py -x -v --timeout=30 ;;
            unit-risk)
              pytest tests/unit/test_risk*.py tests/unit/test_prop_firm*.py -x -v --timeout=30 ;;
            unit-journal)
              pytest tests/unit/test_journal*.py -x -v --timeout=30 ;;
            integration)
              pytest tests/integration/ -x -v --timeout=60 ;;
          esac
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.group }}
          path: .coverage*
