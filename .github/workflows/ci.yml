name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  ruff:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (lint — hard fail)
        run: ruff check . --config pyproject.toml

      - name: Ruff format check (hard fail)
        run: ruff format --check . --config pyproject.toml

  tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wolf_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: wolf_trading
        options: >-
          --health-cmd "pg_isready -U wolf_user -d wolf_trading"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PYTHONPATH: .
      REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql://wolf_user:test_password@localhost:5432/wolf_trading
      DASHBOARD_JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pytest-asyncio pytest-cov

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v --tb=short \
            --timeout=60 \
            --cov=analysis --cov=constitution --cov=execution \
            --cov=dashboard --cov=journal --cov=risk \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  dashboard:
    name: Dashboard build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    env:
      INTERNAL_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/nextjs/package.json

      - name: Install
        run: |
          npm set fetch-retries 5
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: |
          if npm run 2>/dev/null | grep -q " lint"; then npm run lint || echo "Lint warnings ignored"; else echo "No lint script"; fi

      - name: Build
        run: npm run build

  # -------------------------------------------------------------------
  # Deprecated shim guard — block resurrection of retired modules
  # -------------------------------------------------------------------
  shim-guard:
    name: Deprecated shim guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Block resurrected shim files"
        run: |
          echo "Checking that retired shim files have not been re-created..."
          RETIRED_SHIMS=(
            "dashboard/price_feed.py"
            "dashboard/trade_ledger.py"
          )
          FOUND=0
          for SHIM in "${RETIRED_SHIMS[@]}"; do
            if [ -f "$SHIM" ]; then
              echo "::error::Retired shim resurrected: $SHIM"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Remove the file(s) above. Canonical modules live in storage/."
            exit 1
          fi
          echo "No retired shims found."

      - name: "Block deprecated imports in production code"
        run: |
          echo "Scanning for deprecated dashboard imports..."
          DEPRECATED_PATTERNS=(
            "from dashboard.price_feed"
            "from dashboard.trade_ledger"
            "import dashboard.price_feed"
            "import dashboard.trade_ledger"
          )
          VIOLATIONS=""
          for PATTERN in "${DEPRECATED_PATTERNS[@]}"; do
            HITS=$(grep -rn --include="*.py" \
              --exclude-dir=tests \
              --exclude-dir=__pycache__ \
              --exclude-dir=.venv \
              "$PATTERN" . || true)
            if [ -n "$HITS" ]; then
              VIOLATIONS="${VIOLATIONS}${HITS}\n"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Deprecated dashboard imports detected:"
            echo -e "$VIOLATIONS"
            echo "Use storage.price_feed / storage.trade_ledger instead."
            exit 1
          fi
          echo "No deprecated imports found."

  # -------------------------------------------------------------------
  # Architecture drift guard — constitutional boundary spot-checks
  # -------------------------------------------------------------------
  drift-guard:
    name: Architecture drift guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "analysis/ must not contain execution logic"
        run: |
          VIOLATIONS=$(grep -rn --include="*.py" \
            -e "place_order" -e "execute_trade" -e "send_order" \
            -e "market_execution" -e "mt4_send" -e "mt5_send" \
            analysis/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::analysis/ contains execution logic"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: "execution/ must not contain strategy logic"
        run: |
          VIOLATIONS=$(grep -rn --include="*.py" \
            -e "calculate_signal" -e "market_direction" -e "trend_analysis" \
            -e "wolf_score" -e "generate_verdict" \
            execution/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::execution/ contains strategy logic"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: "L12 signal must not carry account state"
        run: |
          python - <<'PYEOF'
          import pathlib, re, sys

          ACCOUNT_FIELDS = re.compile(
              r'\b(balance|equity|margin_used|margin_free|account_size)\b'
          )
          TARGET = pathlib.Path('contracts/redis_stream_contracts.py')
          if not TARGET.exists():
              print(f'SKIP: {TARGET} not found')
              sys.exit(0)

          text = TARGET.read_text()
          # Only scan the VerdictPayload class
          in_verdict = False
          errors = []
          for i, line in enumerate(text.splitlines(), 1):
              if 'class VerdictPayload' in line:
                  in_verdict = True
                  continue
              if in_verdict and line.startswith('class '):
                  break
              if in_verdict and ACCOUNT_FIELDS.search(line):
                  errors.append(f'  {TARGET}:{i}: {line.strip()}')
          if errors:
              print('::error::VerdictPayload contains account-state fields:')
              for e in errors:
                  print(e)
              sys.exit(1)
          print('VerdictPayload is clean — no account-state fields.')
          PYEOF

  # -------------------------------------------------------------------
  # CI Gate — required status check for branch protection
  # -------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [ruff, tests, dashboard, shim-guard, drift-guard]
    if: always()
    steps:
      - name: Evaluate all upstream jobs
        run: |
          echo "ruff:        ${{ needs.ruff.result }}"
          echo "tests:       ${{ needs.tests.result }}"
          echo "dashboard:   ${{ needs.dashboard.result }}"
          echo "shim-guard:  ${{ needs.shim-guard.result }}"
          echo "drift-guard: ${{ needs.drift-guard.result }}"

          FAILED=0
          for JOB in \
            "${{ needs.ruff.result }}" \
            "${{ needs.tests.result }}" \
            "${{ needs.dashboard.result }}" \
            "${{ needs.shim-guard.result }}" \
            "${{ needs.drift-guard.result }}"; do
            if [[ "$JOB" != "success" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI gates passed"
