name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & ASCII compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest flake8

      - name: Check ASCII compliance
        run: |
          python -c "
          import pathlib, sys
          errors = []
          for p in pathlib.Path('.').rglob('*.py'):
              try:
                  text = p.read_text(encoding='utf-8')
                  for i, line in enumerate(text.splitlines(), 1):
                      for ch in line:
                          if ord(ch) > 127 and ch not in '""''':
                              errors.append(f'{p}:{i} -> U+{ord(ch):04X} ({ch!r})')
              except Exception as e:
                  errors.append(f'{p}: read error {e}')
          if errors:
              print('ASCII violations found:')
              for e in errors[:50]:
                  print(f'  {e}')
              sys.exit(1)
          print('All .py files pass ASCII compliance.')
          "

      - name: Flake8 (syntax errors only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Test suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: "Critical gate tests (must pass to merge)"
        run: |
          python -m pytest \
            tests/test_l12_gate.py \
            tests/test_l12_verdict.py \
            tests/test_l11_rr.py \
            tests/test_l2_mta.py \
            tests/test_l10_dynamic_sizing.py \
            tests/test_l10_kelly_integration.py \
            tests/test_l6_correlation_integration.py \
            tests/contract/test_public_api_contract.py \
            tests/test_prop_firm.py \
            tests/test_news_lock.py \
            tests/test_m15_cancel.py \
            tests/test_signal_integrity.py \
            tests/test_signal_throttle.py \
            tests/test_pip_values.py \
            tests/test_journal.py \
            tests/test_l9_smc.py \
            tests/test_dynamic_position_sizing.py \
            tests/test_spread_estimator.py \
            -v --tb=short --strict-markers --timeout=60 \
            --junitxml=test-results/critical.xml

      - name: "Extended test suite (informational)"
        if: always()
        continue-on-error: true
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 \
            --junitxml=test-results/full.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  boundary-check:
    name: Constitutional boundary check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify no execution logic in analysis
        run: |
          echo "Checking analysis/ for execution side-effects..."
          if grep -rn "mt5\.\|MetaTrader\|send_order\|place_order" analysis/ 2>/dev/null; then
            echo "VIOLATION: execution logic found in analysis/"
            exit 1
          fi
          echo "OK: analysis/ is clean."

      - name: Verify no market direction in execution
        run: |
          echo "Checking execution/ for market direction logic..."
          if grep -rn "def.*direction\|calc_signal\|predict_trend" execution/ 2>/dev/null; then
            echo "VIOLATION: market direction logic found in execution/"
            exit 1
          fi
          echo "OK: execution/ is clean."

      - name: Verify journal is append-only
        run: |
          echo "Checking journal/ for mutation operations..."
          if grep -rn "def delete\|def update\|def modify\|\.pop(\|del " journal/ 2>/dev/null | grep -v "# safe:" | grep -v "__pycache__"; then
            echo "WARNING: possible mutation in journal/ (review manually)"
          fi
          echo "OK: journal/ check complete."
