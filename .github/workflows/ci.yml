name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  ruff:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (lint — hard fail)
        run: ruff check . --config pyproject.toml

      - name: Ruff format check (hard fail)
        run: ruff format --check . --config pyproject.toml

  tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wolf_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: wolf_trading
        options: >-
          --health-cmd "pg_isready -U wolf_user -d wolf_trading"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PYTHONPATH: .
      REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql://wolf_user:test_password@localhost:5432/wolf_trading
      DASHBOARD_JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pytest-asyncio pytest-cov

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v --tb=short \
            --timeout=60 \
            --cov=analysis --cov=constitution --cov=execution \
            --cov=dashboard --cov=journal --cov=risk \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  dashboard:
    name: Dashboard build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    env:
      INTERNAL_API_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/nextjs/package.json

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: |
          if npm run 2>/dev/null | grep -q " lint"; then npm run lint || echo "Lint warnings ignored"; else echo "No lint script"; fi

      - name: Build
        run: npm run build

  # -------------------------------------------------------------------
  # CI Gate — required status check for branch protection
  # -------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [ruff, tests, dashboard]
    if: always()
    steps:
      - name: Evaluate all upstream jobs
        run: |
          echo "ruff:      ${{ needs.ruff.result }}"
          echo "tests:     ${{ needs.tests.result }}"
          echo "dashboard: ${{ needs.dashboard.result }}"

          FAILED=0
          for JOB in \
            "${{ needs.ruff.result }}" \
            "${{ needs.tests.result }}" \
            "${{ needs.dashboard.result }}"; do
            if [[ "$JOB" != "success" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI gates passed"
