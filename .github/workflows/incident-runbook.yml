name: Incident Runbook Automation

on:
  workflow_dispatch:
    inputs:
      incident:
        description: "Incident key (e.g. ingest_down, execution_backlog)"
        required: true
        type: string
      service:
        description: "Affected service"
        required: true
        type: choice
        options:
          - wolf_ingest
          - wolf_execution
      auto_rollback:
        description: "Auto-run rollback when checks fail"
        required: true
        type: boolean
        default: false
      rollback_command:
        description: "Rollback command (used only when auto_rollback=true)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  runbook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run incident automation
        env:
          RAILWAY_TOKEN: ${{ secrets['RAILWAY_TOKEN'] }}
          ROLLBACK_COMMAND: ${{ inputs.rollback_command }}
        run: |
          ROLLBACK_FLAGS=""
          if [ "${{ inputs.auto_rollback }}" = "true" ]; then
            ROLLBACK_FLAGS="--auto-rollback --rollback-command ${ROLLBACK_COMMAND}"
          fi

          python scripts/incident_runbook.py \
            --incident "${{ inputs.incident }}" \
            --service "${{ inputs.service }}" \
            ${ROLLBACK_FLAGS}

      - name: Upload incident reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incident-reports
          path: storage/incidents/*.md
          if-no-files-found: warn
