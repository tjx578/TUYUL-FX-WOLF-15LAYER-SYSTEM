name: Wolf-15 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------
  # Python: mypy — HARD FAIL (was soft-fail)
  # ---------------------------------------------------------------
  mypy:
    name: "mypy (strict)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests types-redis

      - name: Run mypy (hard-fail)
        # removed `|| true` — any type error now fails the build
        run: mypy . --config-file pyproject.toml --no-error-summary 2>&1 | tee mypy-report.txt; exit ${PIPESTATUS[0]}

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

  # ---------------------------------------------------------------
  # Python: pytest + coverage with THRESHOLD GATE
  # ---------------------------------------------------------------
  pytest:
    name: "pytest + coverage gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=analysis \
            --cov=constitution \
            --cov=execution \
            --cov=dashboard \
            --cov=journal \
            --cov=risk \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Coverage threshold gate
        run: |
          echo "--- Enforcing minimum coverage ---"
          coverage report --fail-under=70

  # ---------------------------------------------------------------
  # JavaScript/TypeScript: ESLint — HARD FAIL (was soft-fail)
  # ---------------------------------------------------------------
  eslint:
    name: "ESLint (strict)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (hard-fail)
        # removed `|| true` — any lint error now fails the build
        run: npm run lint -- --max-warnings=0

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------
  # Combined gate — PR cannot merge unless all pass
  # ---------------------------------------------------------------
  ci-gate:
    name: "CI Gate (all must pass)"
    runs-on: ubuntu-latest
    needs: [mypy, pytest, eslint]
    if: always()
    steps:
      - name: Check upstream job results
        run: |
          echo "mypy:   ${{ needs.mypy.result }}"
          echo "pytest: ${{ needs.pytest.result }}"
          echo "eslint: ${{ needs.eslint.result }}"

          if [[ "${{ needs.mypy.result }}" != "success" ]]; then
            echo "::error::mypy failed — fix type errors before merging"
            exit 1
          fi
          if [[ "${{ needs.pytest.result }}" != "success" ]]; then
            echo "::error::pytest failed — fix tests or coverage below 70%"
            exit 1
          fi
          if [[ "${{ needs.eslint.result }}" != "success" ]]; then
            echo "::error::eslint failed — fix lint errors before merging"
            exit 1
          fi

          echo "✅ All CI gates passed"
