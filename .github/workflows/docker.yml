name: Docker

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build default image
        run: |
          docker build -t tuyulfx:latest .

      - name: Verify image built successfully
        run: |
          docker images | grep tuyulfx
