# Performance guard — catch regressions in latency-sensitive paths.
# Runs on push/PR when analysis/ or pipeline/ code changes.

name: Perf Guard

on:
  push:
    paths:
      - "analysis/**"
      - "pipeline/**"
      - "ingest/**"
      - "conftest.py"
      - ".github/workflows/perf-guard.yml"
  pull_request:
    paths:
      - "analysis/**"
      - "pipeline/**"
      - "ingest/**"
      - "conftest.py"
      - ".github/workflows/perf-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  import-budget:
    name: Import-time budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Critical-path import must complete < 10s"
        env:
          PYTHONPATH: .
        run: |
          python - <<'PYEOF'
          import time, sys

          BUDGET_SECONDS = 10.0
          MODULES = [
              "analysis.tick_pipeline",
              "analysis.tick_filter",
              "analysis.price_analysis",
              "pipeline.wolf_constitutional_pipeline",
          ]

          start = time.perf_counter()
          for mod in MODULES:
              t0 = time.perf_counter()
              try:
                  __import__(mod)
                  elapsed = time.perf_counter() - t0
                  print(f"  {mod}: {elapsed:.3f}s")
              except Exception as e:
                  # Some modules need Redis/external — not a perf failure
                  elapsed = time.perf_counter() - t0
                  print(f"  {mod}: {elapsed:.3f}s (import note: {e})")
          total = time.perf_counter() - start
          print(f"\nTotal import time: {total:.3f}s  (budget: {BUDGET_SECONDS}s)")
          if total > BUDGET_SECONDS:
              print(f"::error::Import budget exceeded: {total:.1f}s > {BUDGET_SECONDS}s")
              sys.exit(1)
          PYEOF

  slow-test-enforcement:
    name: Slow-test marker enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pytest-asyncio

      - name: "No unmarked test may exceed 5s"
        env:
          PYTHONPATH: .
        run: |
          python - <<'PYEOF'
          import subprocess, json, re, sys

          # Collect test durations using pytest --durations
          result = subprocess.run(
              [
                  sys.executable, "-m", "pytest",
                  "tests/",
                  "--timeout=30",
                  "-q",
                  "--tb=no",
                  "--no-header",
                  "--durations=0",
                  "-m", "not slow",
                  "--ignore=tests/integration",
              ],
              capture_output=True,
              text=True,
              env={**__import__("os").environ, "PYTHONPATH": "."},
          )

          # Parse durations from output
          THRESHOLD = 5.0
          violations = []
          for line in result.stdout.splitlines():
              # Lines like: "1.23s call     tests/test_foo.py::test_bar"
              m = re.match(r'\s*([\d.]+)s\s+(call|setup|teardown)\s+(.+)', line)
              if m and m.group(2) == "call":
                  secs = float(m.group(1))
                  name = m.group(3)
                  if secs > THRESHOLD:
                      violations.append((secs, name))

          if violations:
              print(f"Tests exceeding {THRESHOLD}s without @pytest.mark.slow:")
              for secs, name in violations:
                  print(f"  {secs:.2f}s  {name}")
              print("\nMark them with @pytest.mark.slow or optimize.")
              sys.exit(1)

          print(f"All non-slow tests within {THRESHOLD}s budget.")
          # Also report exit code from pytest itself
          if result.returncode not in (0, 5):
              # 5 = no tests collected (acceptable for filtered runs)
              print(f"pytest exited with code {result.returncode}")
              if result.stderr:
                  print(result.stderr[-500:])
          PYEOF

  tick-module-size:
    name: Tick module complexity guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Tick modules must stay under 500 lines"
        run: |
          MAX_LINES=500
          MODULES=(
            "analysis/tick_pipeline.py"
            "analysis/tick_filter.py"
          )
          OVER=0
          for MOD in "${MODULES[@]}"; do
            if [ -f "$MOD" ]; then
              LINES=$(wc -l < "$MOD")
              echo "  $MOD: ${LINES} lines"
              if [ "$LINES" -gt "$MAX_LINES" ]; then
                echo "::warning::$MOD exceeds ${MAX_LINES}-line budget (${LINES} lines)"
                OVER=1
              fi
            else
              echo "  $MOD: not found (skip)"
            fi
          done
          if [ "$OVER" -eq 1 ]; then
            echo "Consider splitting large tick modules to preserve maintainability."
            exit 1
          fi
          echo "All tick modules within complexity budget."

  perf-gate:
    name: Perf Gate
    runs-on: ubuntu-latest
    needs: [import-budget, slow-test-enforcement, tick-module-size]
    if: always()
    steps:
      - name: Evaluate perf guard jobs
        run: |
          echo "import-budget:          ${{ needs.import-budget.result }}"
          echo "slow-test-enforcement:  ${{ needs.slow-test-enforcement.result }}"
          echo "tick-module-size:       ${{ needs.tick-module-size.result }}"

          FAILED=0
          for JOB in \
            "${{ needs.import-budget.result }}" \
            "${{ needs.slow-test-enforcement.result }}" \
            "${{ needs.tick-module-size.result }}"; do
            if [[ "$JOB" != "success" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::Perf guard check failed"
            exit 1
          fi

          echo "All perf guard checks passed"
