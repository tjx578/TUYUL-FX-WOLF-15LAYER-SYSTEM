name: Wolf-15 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------
  # Python: mypy — HARD FAIL
  # ---------------------------------------------------------------
  mypy:
    name: "mypy (strict)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests types-redis

      - name: Run mypy (hard-fail)
        run: |
          set -o pipefail
          mypy . --config-file pyproject.toml 2>&1 | tee mypy-report.txt

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

  # ---------------------------------------------------------------
  # Python: ruff lint — HARD FAIL
  # ---------------------------------------------------------------
  ruff:
    name: "ruff (lint + format check)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint (hard-fail)
        run: ruff check . --config pyproject.toml

      - name: Ruff format check (hard-fail)
        run: ruff format --check . --config pyproject.toml

  # ---------------------------------------------------------------
  # Python: pytest + coverage with THRESHOLD GATE
  # ---------------------------------------------------------------
  pytest:
    name: "pytest + coverage gate (≥70%)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=analysis \
            --cov=constitution \
            --cov=execution \
            --cov=dashboard \
            --cov=journal \
            --cov=risk \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------
  # Dashboard: ESLint + TypeScript — HARD FAIL
  # ---------------------------------------------------------------
  eslint:
    name: "ESLint + tsc (strict)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (hard-fail, zero warnings)
        run: npm run lint -- --max-warnings=0

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------
  # Combined gate — required status check for branch protection
  # ---------------------------------------------------------------
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [mypy, ruff, pytest, eslint]
    if: always()
    steps:
      - name: Evaluate all upstream jobs
        run: |
          echo "mypy:   ${{ needs.mypy.result }}"
          echo "ruff:   ${{ needs.ruff.result }}"
          echo "pytest: ${{ needs.pytest.result }}"
          echo "eslint: ${{ needs.eslint.result }}"

          FAILED=0
          for JOB_RESULT in \
            "${{ needs.mypy.result }}" \
            "${{ needs.ruff.result }}" \
            "${{ needs.pytest.result }}" \
            "${{ needs.eslint.result }}"; do
            if [[ "$JOB_RESULT" != "success" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more CI jobs failed — cannot merge"
            exit 1
          fi

          echo "✅ All CI gates passed"