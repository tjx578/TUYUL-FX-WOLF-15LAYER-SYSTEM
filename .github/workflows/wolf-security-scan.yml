name: Wolf Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------
  # Python: pip-audit
  # ---------------------------------------------------------------
  pip-audit:
    name: "pip-audit (Python deps)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit (hard-fail)
        run: pip-audit --desc --strict

  # ---------------------------------------------------------------
  # Node.js: npm audit
  # ---------------------------------------------------------------
  npm-audit:
    name: "npm audit (Node deps)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on high+)
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------
  # Secret leak scan
  # ---------------------------------------------------------------
  secret-scan:
    name: "Secret leak scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets (hard-fail)
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --exclude-paths=.github/trufflehog-exclude.txt

  # ---------------------------------------------------------------
  # Security gate
  # ---------------------------------------------------------------
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [pip-audit, npm-audit, secret-scan]
    if: always()
    steps:
      - name: Evaluate security results
        run: |
          FAILED=0
          for JOB_RESULT in \
            "${{ needs.pip-audit.result }}" \
            "${{ needs.npm-audit.result }}" \
            "${{ needs.secret-scan.result }}"; do
            if [[ "$JOB_RESULT" != "success" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::Security scan failed — review artifacts"
            exit 1
          fi

          echo "✅ All security gates passed"