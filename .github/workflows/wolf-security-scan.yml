name: Wolf Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------
  # Python: pip-audit
  # ---------------------------------------------------------------
  pip-audit:
    name: "pip-audit (Python deps)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit (hard-fail)
        run: pip-audit --desc --strict --ignore-vuln CVE-2026-4539  # pygments: no fix available, local-access only

  # ---------------------------------------------------------------
  # Node.js: npm audit
  # ---------------------------------------------------------------
  npm-audit:
    name: "npm audit (Node deps)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/nextjs/package-lock.json

      - name: Validate lockfile sync
        run: npm ci --ignore-scripts

      - name: Install dependencies
        run: |
          npm set fetch-retries 5
          npm ci

      - name: Run npm audit (report)
        run: npm audit --audit-level=high --json > npm-audit-report.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: dashboard/nextjs/npm-audit-report.json
          if-no-files-found: warn

      - name: Fail on high+
        run: |
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('npm-audit-report.json','utf8'));const v=r.metadata?.vulnerabilities||{};if((v.high||0)+(v.critical||0)>0){console.error('High/Critical vulnerabilities found:',v);process.exit(1)}"

  # ---------------------------------------------------------------
  # Secret leak scan
  # ---------------------------------------------------------------
  secret-scan:
    name: "Secret leak scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets (hard-fail)
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --exclude-paths=.github/trufflehog-exclude.txt

  # ---------------------------------------------------------------
  # Security gate
  # ---------------------------------------------------------------
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [pip-audit, npm-audit, secret-scan]
    if: always()
    steps:
      - name: Evaluate security results
        run: |
          set -euo pipefail

          declare -A results=(
            ["pip-audit"]="${{ needs.pip-audit.result }}"
            ["npm-audit"]="${{ needs.npm-audit.result }}"
            ["secret-scan"]="${{ needs.secret-scan.result }}"
          )

          failed=0
          for job in "${!results[@]}"; do
            if [[ "${results[$job]}" != "success" ]]; then
              echo "::error::$job failed (result=${results[$job]})"
              failed=1
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi

          echo "✅ All security gates passed"