[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash deploy/railway/start_engine_consolidated.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Engine-only mode (RUN_MODE=engine-only).
# Ingest runs as a separate service (railway-ingestor.toml).
