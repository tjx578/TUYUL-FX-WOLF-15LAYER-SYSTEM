version: "3.9"

services:
  # ── TUYUL Trading Swarm API + Dashboard ──────────────────────
  tuyul-swarm:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - PORT=8000
      - APP_ENV=prod
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    volumes:
      - ./storage:/app/storage
    networks:
      - tuyul_net

  # ── Redis (Memory Fabric + Event Bus) ────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-tuyul_redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-tuyul_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - tuyul_net

volumes:
  redis_data:

networks:
  tuyul_net:
    driver: bridge
