finnhub:
  provider: "finnhub"
  mode: "realtime"

websocket:
  enabled: true
  url: "wss://ws.finnhub.io"
  reconnect: true
  reconnect_interval_sec: 5
  ping_interval_sec: 30

rest:
  base_url: "https://finnhub.io/api/v1"
  timeout_sec: 20
  retries: 3
  backoff_factor: 1.5

candles:
  tick_timeframes: ["M15"]           # Built from WS ticks (monitoring only)
  analysis_timeframes: ["H1", "H4", "D1", "W1", "MN"]  # Fetched from REST
  max_history: 500
  warmup:
    enabled: true
    bars: 100
    timeframes: ["H1", "H4", "D1", "W1", "MN"]
    request_delay_sec: 0.5
    max_concurrent: 5
    min_bars:                          # Minimum bars for READY state
      MN: 12
      W1: 20
      D1: 50
      H4: 10
      H1: 50
  refresh:
    h1_interval_sec: 3600             # Refresh H1 every 1 hour
    h1_bars: 5                        # Fetch last 5 bars on refresh
    price_drift_max_pips: 50.0        # Max allowed drift REST vs WS
    m15_cold_start_min_bars: 10       # M15 bar count below which recovery triggers
    m15_recovery_bars: 100            # Number of M15 bars to fetch on cold start

# ── REST poll fallback: activates when WebSocket is disconnected ──
rest_poll_fallback:
  poll_interval_sec: 90               # Seconds between REST poll cycles
  grace_before_poll_sec: 30           # Wait before first poll (WS may reconn quickly)
  bars: 4                             # M15 bars per symbol per cycle
  refresh_h1: true                    # Also fetch H1 + re-aggregate H4
  h1_bars: 2                          # H1 bars per symbol per cycle

symbols:
  include_forex: true
  include_commodities: true
  # Finnhub forex prefix: "OANDA:"
  # e.g. EURUSD → OANDA:EUR_USD, XAUUSD → OANDA:XAU_USD
  symbol_prefix: "OANDA"

# ── Tick filter: spike rejection & dedup ─────────────────────────
tick_filter:
  # Per-symbol spike threshold (percentage). Ticks exceeding this are rejected.
  spike_thresholds:
    XAUUSD: 2.0     # Gold is volatile
    GBPJPY: 1.0     # High-vol cross
    EURUSD: 0.5     # Major pair
    GBPUSD: 0.5
    USDJPY: 0.5
    AUDUSD: 0.5
  default_spike_pct: 0.5           # Fallback for unlisted symbols
  staleness_sec: 60.0              # Reset baseline after N seconds of silence
  dedup_window_sec: 0.05           # Reject identical (symbol+price+ts) within window

# ── Signal conditioning (pre-L7 Monte Carlo) ─────────────────────
signal_conditioning:
  enabled: true
  ema_span: 5
  outlier_mad_scale: 6.0
  min_samples: 20
  adaptive_sampling: true
  high_noise_ratio: 0.65
  high_noise_stride: 2
  realtime_window_ticks: 128
  realtime_min_prices: 20

news:
  enabled: true
  endpoint: "/calendar/economic"
  impact_levels:
    high: true
    medium: true
    low: false
  pre_event_lock_minutes: 30
  post_event_lock_minutes: 15
  poll_interval_sec: 300

# NEW: Market news articles for sentiment analysis
market_news:
  enabled: true
  endpoint: "/news"
  category: "forex"
  poll_interval_sec: 600        # 10 minutes — less aggressive than calendar
  max_articles: 50              # limit per fetch
  sentiment_keywords:
    bullish: ["hawkish", "rate hike", "strong", "beat", "surge"]
    bearish: ["dovish", "rate cut", "weak", "miss", "decline"]
