# DEPRECATED: Orchestrator is now embedded in the API service
# (railway.toml, WOLF15_EMBED_ORCHESTRATOR=true). Keep this file
# for rollback to per-service deployment if needed.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash deploy/railway/start_orchestrator.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
