[alembic]
script_location = storage/migrations
# URL is intentionally empty here; set DATABASE_URL env var at runtime or
# pass --url to the alembic CLI.  See storage/migrations/env.py.
sqlalchemy.url =
# Store revision history in the public schema under a clearly-named table.
version_table = alembic_version

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
