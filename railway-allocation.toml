# DEPRECATED: Allocation is now consolidated into the Trade service
# (railway-execution.toml, services.trade.runner). Keep this file
# for rollback to per-service deployment if needed.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash deploy/railway/start_allocation.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
