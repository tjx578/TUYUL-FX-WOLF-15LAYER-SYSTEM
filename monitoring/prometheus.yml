global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

# ---------------------------------------------------------------------------
# Scrape targets
#
# Docker Compose:  services resolve via container name on wolf15_net.
# Railway:         override targets via file_sd or env vars at deploy time
#                  by mounting a custom targets/*.json into the container.
#                  See monitoring/targets/README.md for Railway setup.
#
# Metrics exposition per service:
#   API (app)       — GET /metrics on port 8000 (FastAPI route)
#   Allocation      — prometheus_client.start_http_server on port 9102
#   Execution       — prometheus_client.start_http_server on port 9103
# ---------------------------------------------------------------------------

scrape_configs:
  # ── Wolf API (main FastAPI app) — serves /metrics from core.metrics registry
  - job_name: 'wolf-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8000']
        labels:
          service: api
    # Railway override: set WOLF_API_TARGET env var
    # e.g. WOLF_API_TARGET=wolf-api.railway.internal:8000
    file_sd_configs:
      - files: ['/etc/prometheus/targets/wolf-api.json']
        refresh_interval: 30s

  # ── Allocation worker — dedicated prometheus_client HTTP server
  - job_name: 'wolf-allocation'
    static_configs:
      - targets: ['wolf-allocation:9102']
        labels:
          service: allocation
    file_sd_configs:
      - files: ['/etc/prometheus/targets/wolf-allocation.json']
        refresh_interval: 30s

  # ── Execution worker — dedicated prometheus_client HTTP server
  - job_name: 'wolf-execution'
    static_configs:
      - targets: ['wolf-execution:9103']
        labels:
          service: execution
    file_sd_configs:
      - files: ['/etc/prometheus/targets/wolf-execution.json']
        refresh_interval: 30s

