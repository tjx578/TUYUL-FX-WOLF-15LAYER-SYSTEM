# ──────────────────────────────────────────────────────────────────
# IMPORTANT: Replace ${API_DOMAIN} with your actual domain before use.
# Example: api.tuyulfx.com
# ──────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name ${API_DOMAIN};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ${API_DOMAIN};

    # SSL certs managed by your ACME workflow / platform
    ssl_certificate     /etc/letsencrypt/live/${API_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${API_DOMAIN}/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://${API_DOMAIN} wss://${API_DOMAIN};" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass https://your-railway-backend.up.railway.app;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket timeouts — must exceed server ping interval (15s).
        # 3600s = 1 hour; server-side heartbeat keeps the connection alive.
        # Previous value (75s) caused premature disconnects on idle streams.
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_pass https://your-railway-backend.up.railway.app/ws/;
    }
}
