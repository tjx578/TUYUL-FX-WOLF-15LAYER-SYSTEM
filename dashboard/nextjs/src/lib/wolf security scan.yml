name: Wolf Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 06:00 UTC to catch newly disclosed CVEs
    - cron: "0 6 * * *"

permissions:
  contents: read
  security-events: write   # needed for GitHub Security tab

jobs:
  # ---------------------------------------------------------------
  # Python dependency audit (pip-audit)
  # ---------------------------------------------------------------
  pip-audit:
    name: "pip-audit (Python deps)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit (hard-fail on HIGH/CRITICAL)
        run: |
          echo "--- Python Dependency Vulnerability Scan ---"
          pip-audit \
            --require-hashes=false \
            --desc \
            --format=json \
            --output=pip-audit-report.json \
            || true

          # Parse results — fail on HIGH or CRITICAL
          python - <<'PYEOF'
          import json, sys

          with open("pip-audit-report.json") as f:
              report = json.load(f)

          vulns = report.get("dependencies", [])
          critical = []
          for dep in vulns:
              for v in dep.get("vulns", []):
                  sev = v.get("fix_versions", [])
                  desc = v.get("description", "")
                  vid = v.get("id", "UNKNOWN")
                  print(f"  ⚠ {dep['name']} — {vid}: {desc[:120]}")
                  critical.append(vid)

          if critical:
              print(f"\n❌ Found {len(critical)} vulnerability(ies) — failing build")
              sys.exit(1)
          else:
              print("✅ No known vulnerabilities found")
          PYEOF

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # ---------------------------------------------------------------
  # Node.js dependency audit (npm audit)
  # ---------------------------------------------------------------
  npm-audit:
    name: "npm audit (Node deps)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/nextjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (hard-fail on high+)
        run: |
          echo "--- Node Dependency Vulnerability Scan ---"
          npm audit --audit-level=high --json > npm-audit-report.json 2>&1 || true

          # npm audit exit code: 0=clean, non-zero=vulns found
          # Re-run with strict level for gating
          npm audit --audit-level=high

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: dashboard/nextjs/npm-audit-report.json

  # ---------------------------------------------------------------
  # Secret scanning — ensure no keys/tokens in code
  # ---------------------------------------------------------------
  secret-scan:
    name: "Secret leak scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for scanning

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --exclude-paths=.github/trufflehog-exclude.txt \
            --json > secret-scan-report.json 2>&1 || {
              echo "::error::Potential secrets detected in repository — review secret-scan-report.json"
              exit 1
            }
          echo "✅ No secrets detected"

      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secret-scan-report.json

  # ---------------------------------------------------------------
  # Security gate
  # ---------------------------------------------------------------
  security-gate:
    name: "Security Gate (all must pass)"
    runs-on: ubuntu-latest
    needs: [pip-audit, npm-audit, secret-scan]
    if: always()
    steps:
      - name: Evaluate security results
        run: |
          echo "pip-audit:   ${{ needs.pip-audit.result }}"
          echo "npm-audit:   ${{ needs.npm-audit.result }}"
          echo "secret-scan: ${{ needs.secret-scan.result }}"

          FAILED=0
          for job in pip-audit npm-audit secret-scan; do
            result="${{ needs[job].result || 'skipped' }}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::${job} did not pass (${result})"
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            exit 1
          fi
          echo "✅ All security gates passed"