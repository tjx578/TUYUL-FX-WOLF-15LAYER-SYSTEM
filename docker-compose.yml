version: "3.8"

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      - EMBED_INGEST=true
      - CONTEXT_MODE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${APP_PORT:-8000}:${PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - wolf15_net

  wolf-allocation:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "allocation.async_worker"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ALLOC_METRICS_PORT=9102
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9102:9102"
    networks:
      - wolf15_net

  wolf-execution:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "execution.async_worker"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - EXEC_METRICS_PORT=9103
      - EA_BRIDGE_URL=${EA_BRIDGE_URL:-http://host.docker.internal:8081}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9103:9103"
    networks:
      - wolf15_net

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - wolf15_net

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - wolf15_net

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 128
      --tcp-keepalive 60
      --timeout 300
      --hz 10
      --client-output-buffer-limit "normal 0 0 0"
      --client-output-buffer-limit "pubsub 8mb 4mb 30"
    ports:
      # Bind to localhost only — not reachable from external network
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  wolf15_net:
    driver: bridge
