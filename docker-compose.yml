version: "3.8"

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - wolf15_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Enforce password + memory policy; no host port exposure
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No 'ports:' → only accessible within wolf15_net (internal only)
    networks:
      - wolf15_net

volumes:
  redis_data:
    driver: local

networks:
  wolf15_net:
    driver: bridge
