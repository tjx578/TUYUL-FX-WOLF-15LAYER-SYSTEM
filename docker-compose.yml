version: '3.8'

services:
  # ================================================
  # Redis - Data Storage
  # ================================================
  redis:
    image: redis:7-alpine
    container_name: tuyulfx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tuyulfx-network

  # ================================================
  # Trading Engine - Main Logic
  # ================================================
  engine:
    build:
      context: .
      target: engine
    container_name: tuyulfx-engine
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tuyulfx-network

  # ================================================
  # Ingest Service - Finnhub WebSocket
  # ================================================
  ingest:
    build:
      context: .
      target: ingest
    container_name: tuyulfx-ingest
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tuyulfx-network

  # ================================================
  # API Server - FastAPI Dashboard Backend
  # ================================================
  api:
    build:
      context: .
      target: api
    container_name: tuyulfx-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; import requests; sys.exit(0 if requests.get('http://localhost:8000/health', timeout=5).status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tuyulfx-network

  # ================================================
  # Next.js Dashboard - Frontend (Optional)
  # Uncomment when Next.js dashboard is ready
  # ================================================
  # dashboard:
  #   build:
  #     context: ./dashboard/nextjs
  #     dockerfile: Dockerfile
  #   container_name: tuyulfx-dashboard
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #     - NEXT_PUBLIC_API_URL=http://api:8000
  #     - NEXT_PUBLIC_TIMEZONE=Asia/Singapore
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - tuyulfx-network

  # ================================================
  # Nginx - Reverse Proxy (Optional)
  # Uncomment for production deployment with SSL
  # ================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: tuyulfx-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/hostinger/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - api
  #     - dashboard
  #   restart: unless-stopped
  #   networks:
  #     - tuyulfx-network

volumes:
  redis_data:
    driver: local

networks:
  tuyulfx-network:
    driver: bridge
