# DEPRECATED: Ingest is now consolidated into the Engine service
# (railway-engine.toml, RUN_MODE=engine-ingest). Keep this file
# for rollback to per-service deployment if needed.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash deploy/railway/start_ingest.sh"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
